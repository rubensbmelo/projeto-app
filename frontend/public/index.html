<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- PWA — Identidade -->
    <meta name="application-name" content="RepFlow" />
    <meta name="description" content="Sistema de gestão para representantes comerciais de embalagens" />
    <meta name="theme-color" content="#1E40AF" />

    <!-- PWA — iOS (Safari não lê manifest) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RepFlow" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png" />

    <!-- PWA — Splash screen iOS -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- PWA — Android / Chrome -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- Open Graph (compartilhamento) -->
    <meta property="og:title" content="RepFlow" />
    <meta property="og:description" content="Gestão de representantes comerciais" />
    <meta property="og:type" content="website" />

    <title>RepFlow</title>
  </head>
  <body>
    <noscript>Você precisa habilitar o JavaScript para usar o RepFlow.</noscript>
    <div id="root"></div>
  </body>
</html>
